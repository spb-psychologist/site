<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR-код — Маргарита Иванова, психолог</title>
  <meta name="robots" content="noindex">

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="img/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/icons/apple-touch-icon.png">
  <link rel="manifest" href="img/icons/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      margin: 0;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg);
      font-family: var(--font-body);
      padding: var(--sp-8) var(--sp-6);
      box-sizing: border-box;
    }

    .qr-card {
      background: var(--color-white);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: var(--sp-10) var(--sp-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-6);
      max-width: 360px;
      width: 100%;
    }

    .qr-name {
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
      font-weight: 500;
      color: var(--color-text);
      text-align: center;
      margin: 0;
    }

    .qr-role {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-accent);
      text-align: center;
      margin-top: calc(-1 * var(--sp-4));
    }

    .qr-divider {
      width: 40px;
      height: 1px;
      background: var(--color-border);
    }

    .qr-frame {
      padding: var(--sp-4);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-white);
    }

    .qr-frame img {
      display: block;
      border-radius: var(--radius-sm);
    }

    .qr-hint {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-align: center;
      line-height: 1.5;
    }

    .qr-url {
      font-size: var(--text-xs);
      color: var(--color-text-light);
      text-align: center;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="qr-card">
    <div>
      <h1 class="qr-name">Маргарита Иванова</h1>
    </div>
    <div class="qr-frame">
      <img src="img/qrcode.png" width="240" height="240" alt="QR-код для перехода на страницу контактов">
    </div>
    <p class="qr-hint">Отсканируйте QR-код, чтобы перейти на страницу контактов</p>
    <p class="qr-url"><a href="https://ivanova-psiholog.ru/contacts.html">ivanova-psiholog.ru/contacts.html</a></p>
  </div>
</body>
</html>
