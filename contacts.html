  <style>
    /* ── Contacts page specific styles ── */
    .contacts-page {
      min-height: calc(100vh - var(--header-height));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-block: var(--sp-20);
      background-color: var(--color-bg);
    }

    .contacts-page__inner {
      width: 100%;
      max-width: 540px;
      margin-inline: auto;
      padding-inline: var(--container-pad);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-6);
    }

    /* Avatar */
    .contacts-avatar {
      width: 108px;
      height: 108px;
      border-radius: var(--radius-full);
      overflow: hidden;
      border: 3px solid var(--color-border);
      flex-shrink: 0;
      box-shadow: var(--shadow-md);
    }

    .contacts-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }

    /* Name & subtitle */
    .contacts-identity {
      text-align: center;
    }

    .contacts-identity__name {
      font-family: var(--font-heading);
      font-size: var(--text-3xl);
      font-weight: 500;
      color: var(--color-text);
      margin-bottom: var(--sp-2);
    }

    .contacts-identity__role {
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-accent);
    }

    /* Divider */
    .contacts-divider {
      width: 48px;
      height: 1px;
      background: var(--color-border);
    }

    /* Link cards */
    .contacts-links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      padding: var(--sp-4) var(--sp-6);
      background: var(--color-white);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      text-decoration: none;
      color: var(--color-text);
      transition:
        border-color var(--transition-base),
        box-shadow var(--transition-base),
        transform var(--transition-fast),
        background var(--transition-base);
      box-shadow: var(--shadow-sm);
    }

    .contact-link:hover,
    .contact-link:focus-visible {
      border-color: var(--color-accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .contact-link--primary {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: var(--color-white);
    }

    .contact-link--primary:hover,
    .contact-link--primary:focus-visible {
      background: var(--color-accent-dark);
      border-color: var(--color-accent-dark);
    }

    .contact-link__icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: var(--color-bg-alt);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--color-accent);
      transition: background var(--transition-base);
    }

    .contact-link--primary .contact-link__icon {
      background: rgba(255, 255, 255, 0.18);
      color: var(--color-white);
    }

    .contact-link__body {
      flex: 1;
      min-width: 0;
    }

    .contact-link__label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 2px;
    }

    .contact-link--primary .contact-link__label {
      color: rgba(255, 255, 255, 0.75);
    }

    .contact-link__value {
      display: block;
      font-size: var(--text-md);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contact-link__arrow {
      color: var(--color-text-light);
      flex-shrink: 0;
      transition: transform var(--transition-base), color var(--transition-base);
    }

    .contact-link:hover .contact-link__arrow {
      transform: translateX(3px);
      color: var(--color-accent);
    }

    .contact-link--primary .contact-link__arrow {
      color: rgba(255, 255, 255, 0.6);
    }

    .contact-link--primary:hover .contact-link__arrow {
      color: var(--color-white);
    }

    /* Info badge */
    .contacts-info-badge {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      background: var(--color-bg-alt);
      border-radius: var(--radius-full);
      padding: var(--sp-2) var(--sp-4);
    }

    /* Back to site link */
    .contacts-back {
      margin-top: var(--sp-2);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      transition: color var(--transition-fast);
    }

    .contacts-back:hover {
      color: var(--color-accent);
    }

    /* Minimal footer on this page */
    .contacts-page-footer {
      text-align: center;
      padding-block: var(--sp-6);
      font-size: var(--text-xs);
      color: var(--color-text-light);
    }

    /* Section label */
    .contacts-section-label {
      width: 100%;
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-light);
      padding-bottom: var(--sp-1);
    }
  </style>
